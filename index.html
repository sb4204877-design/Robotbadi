<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>3D Robot · Projector Signals</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 30% 40%, #0a0f1e 0%, #03060c 100%);
      overflow: hidden; font-family: 'Cairo', 'Inter', sans-serif; cursor: default; position: relative;
    }

    .robot-container {
      position: absolute; display: flex; flex-direction: column; align-items: center;
      filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
      will-change: left, top, transform;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%) scale(0.65);
      transition: left 1.2s cubic-bezier(0.34,1.2,0.64,1), top 1.2s cubic-bezier(0.34,1.2,0.64,1), transform 1.2s cubic-bezier(0.34,1.2,0.64,1), opacity 0.8s ease;
      z-index: 100;
    }
    .robot-container.hidden { opacity: 0; pointer-events: none; }

    .head {
      width: 180px; height: 145px;
      background: radial-gradient(ellipse at 30% 25%, #f0f8ff 0%, #c5d5e8 25%, #9eb8d4 50%, #7a9bbf 75%, #5a7fa8 100%);
      border-radius: 60px 60px 55px 55px;
      position: relative; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 30px 45px rgba(0,0,0,0.6), 0 15px 20px rgba(0,0,0,0.4), inset -8px -12px 18px rgba(0,0,0,0.25), inset 12px 15px 25px rgba(255,255,255,0.8), inset -3px -3px 8px rgba(0,0,0,0.15), 0 0 0 1.5px rgba(255,255,255,0.4), 0 0 0 3px rgba(100,150,200,0.15);
      z-index: 20; transition: transform 1s cubic-bezier(0.34,1.2,0.64,1);
      transform-origin: center 80%;
    }
    .head.sleeping { transform: rotate(25deg); }
    .head.looking-up { transform: rotate(-12deg); }
    .head::before {
      content: ''; position: absolute; top: 10px; left: 25px; width: 85px; height: 45px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.4) 50%, transparent 80%);
      border-radius: 50%; filter: blur(8px); transform: rotate(-15deg); opacity: 0.9;
    }
    .head::after {
      content: ''; position: absolute; bottom: 15px; right: 18px; width: 50px; height: 30px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.5) 0%, rgba(200,220,255,0.2) 60%, transparent 90%);
      border-radius: 50%; filter: blur(6px); transform: rotate(20deg);
    }

    .ear-module { position: absolute; top: 55px; width: 24px; height: 45px; z-index: 19; }
    .ear-module.left { left: -22px; }
    .ear-module.right { right: -22px; }
    .ear-main {
      width: 22px; height: 36px;
      background: radial-gradient(ellipse at 35% 30%, #8ab8e8 0%, #4a8ec5 40%, #2a6bb0 70%, #1a4a8a 100%);
      border-radius: 10px 10px 8px 8px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.5), inset 3px 3px 8px rgba(255,255,255,0.6);
      border-left: 1px solid rgba(255,255,255,0.5); position: relative; margin: 0;
    }
    .horn-pill {
      width: 12px; height: 26px;
      background: linear-gradient(145deg, #6aacf0, #0e3d7a);
      border-radius: 6px 6px 4px 4px; position: absolute; top: -20px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.5); border-left: 1px solid rgba(255,255,255,0.4);
    }
    .ear-module.left .horn-pill { left: 2px; transform: rotate(-25deg); transform-origin: bottom right; }
    .ear-module.right .horn-pill { right: 2px; transform: rotate(25deg); transform-origin: bottom left; }

    .screen {
      width: 155px; height: 108px;
      background: linear-gradient(145deg, #0e1218 0%, #020305 100%);
      border-radius: 38px; display: flex; align-items: center; justify-content: center; gap: 20px;
      border: 1.5px solid #2a6f9f;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.95), 0 0 20px rgba(0,242,255,0.3);
      position: relative; overflow: hidden;
    }
    .screen::before {
      content: ''; position: absolute; width: 100%; height: 100%;
      background: repeating-linear-gradient(45deg, rgba(0,242,255,0.04) 0px, rgba(0,242,255,0.04) 2px, transparent 2px, transparent 8px);
      animation: scan 8s linear infinite; border-radius: 38px;
    }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 50px 50px; } }
    .bracket { position: absolute; width: 14px; height: 14px; border: 2px solid #0cf; opacity: 0.9; filter: drop-shadow(0 0 6px #0cf); z-index: 2; }
    .tl { top: 12px; left: 12px; border-right: 0; border-bottom: 0; }
    .tr { top: 12px; right: 12px; border-left: 0; border-bottom: 0; }
    .bl { bottom: 12px; left: 12px; border-right: 0; border-top: 0; }
    .br { bottom: 12px; right: 12px; border-left: 0; border-top: 0; }

    .eye { width: 44px; height: 32px; position: relative; transform: translateY(10px); cursor: pointer; transition: all 0.2s ease; }
    .eye::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border: 5px solid #0cf; border-color: #0cf transparent transparent transparent;
      border-radius: 50%; filter: drop-shadow(0 0 15px #0cf); animation: blink 4s infinite;
      transform: scaleX(0.85); transition: all 0.3s ease;
    }
    .eye.closed::before { border: 5px solid #0cf; border-color: transparent transparent #0cf transparent; border-radius: 50%; transform: scaleX(0.85) scaleY(0.15); animation: none; }
    .eye.looking-up::before { transform: scaleX(0.85) translateY(-4px); border-color: #0cf transparent transparent transparent; }
    .eye::after {
      content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
      width: 8px; height: 8px; background: radial-gradient(circle, #aaffff 0%, #0cf 50%, #0099cc 100%);
      border-radius: 50%; filter: blur(3px); animation: pulse 1.5s infinite; box-shadow: 0 0 15px #0cf;
      transition: opacity 0.3s ease, bottom 0.3s ease;
    }
    .eye.looking-up::after { bottom: 0px; }
    .eye.closed::after { opacity: 0; }

    @keyframes blink { 0%, 94%, 100% { opacity: 1; transform: scaleY(1) scaleX(0.85); } 97% { opacity: 0.3; transform: scaleY(0.05) scaleX(0.85); } }
    @keyframes pulse { 0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); } 50% { opacity: 1; transform: translateX(-50%) scale(1.4); } }

    .sleep-zzz {
      position: absolute; top: -40px; right: -30px; display: flex; flex-direction: column;
      align-items: center; opacity: 0; transition: opacity 0.8s ease; z-index: 25;
    }
    .sleep-zzz.show { opacity: 1; }
    .z-letter {
      color: #0cf; font-family: 'Cairo', sans-serif; font-weight: 900;
      text-shadow: 0 0 20px #0cf; filter: drop-shadow(0 0 5px rgba(0,204,255,0.8));
      animation: floatZ 2s ease-in-out infinite;
    }
    .z-letter:nth-child(1) { font-size: 18px; opacity: 0.6; animation-delay: 0s; }
    .z-letter:nth-child(2) { font-size: 24px; opacity: 0.8; animation-delay: 0.3s; }
    .z-letter:nth-child(3) { font-size: 30px; opacity: 1; animation-delay: 0.6s; }
    @keyframes floatZ { 0%, 100% { transform: translateY(0) rotate(-10deg); } 50% { transform: translateY(-15px) rotate(5deg); } }

    .body-group { margin-top: -28px; position: relative; display: flex; flex-direction: column; align-items: center; }
    .head-to-body-shadow {
      position: absolute; top: 0; width: 110px; height: 25px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 100%);
      filter: blur(12px); z-index: 15; border-radius: 50%;
    }
    .vest-blue {
      width: 145px; height: 95px;
      background: radial-gradient(ellipse at 25% 25%, #8ab8ff 0%, #1a4a8a 80%, #0e2d5a 100%);
      border-radius: 55px 55px 40px 40px; z-index: 10;
      display: flex; justify-content: center; align-items: center; padding-top: 18px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 10px 12px 20px rgba(255,255,255,0.5); position: relative;
    }
    .vest-blue::before {
      content: ''; position: absolute; top: 10px; left: 20px; width: 50px; height: 30px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.4) 0%, transparent 70%);
      border-radius: 50%; filter: blur(6px); transform: rotate(-15deg);
    }
    .reactor-core {
      width: 45px; height: 45px;
      background: radial-gradient(circle at 35% 35%, #fff 0%, #0cf 70%, #0099cc 100%);
      border-radius: 50%;
      box-shadow: 0 0 30px #0cf, 0 0 60px #0cf, inset 0 0 15px rgba(255,255,255,0.9);
      border: 3px solid #8cc9ff; animation: reactorPulse 2s ease-in-out infinite;
      position: relative; transition: box-shadow 0.5s ease;
    }
    .reactor-core.projecting { box-shadow: 0 0 60px #0cf, 0 0 120px #0cf, 0 0 180px #5a9eff, inset 0 0 20px #fff; animation: reactorPulseProjecting 1.5s ease-in-out infinite; }
    .reactor-core::before {
      content: ''; position: absolute; top: 50%; left: 50%; width: 18px; height: 18px;
      background: radial-gradient(circle, #fff 0%, #aaffff 60%, transparent 100%);
      border-radius: 50%; transform: translate(-50%, -50%); filter: blur(5px); box-shadow: 0 0 20px #fff;
    }
    @keyframes reactorPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    @keyframes reactorPulseProjecting { 0%, 100% { transform: scale(1.05); } 50% { transform: scale(1.15); } }

    .belly-white {
      width: 125px; height: 125px;
      background: radial-gradient(ellipse at 30% 30%, #fff 0%, #a0b4cc 100%);
      border-radius: 50% 50% 55% 55% / 45% 45% 55% 55%; margin-top: -65px; z-index: 5;
      box-shadow: 0 25px 40px rgba(0,0,0,0.45), inset 12px 14px 25px rgba(255,255,255,0.8); position: relative;
    }

    .arm {
      position: absolute; width: 55px; height: 105px; z-index: 12;
      transform-origin: top center; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
      transition: transform 0.2s cubic-bezier(0.34,1.2,0.64,1);
    }
    .arm.waving { left: -44px; top: 25px; }
    .arm.idle { right: -44px; top: 25px; }
    .arm.sleeping { transition: transform 0.8s cubic-bezier(0.34,1.2,0.64,1); }
    .arm.waving.sleeping { transform: rotate(15deg) translateY(15px); }
    .arm.idle.sleeping { transform: rotate(-20deg) translateY(15px); }
    .shoulder-blue {
      width: 100%; height: 60%;
      background: radial-gradient(ellipse at 30% 25%, #7ab0f0 0%, #1a4a8a 100%);
      border-radius: 55% 55% 45% 45%;
      box-shadow: 0 14px 22px rgba(0,0,0,0.45); position: relative;
    }
    .forearm-white {
      width: 75%; height: 45%;
      background: radial-gradient(ellipse at 35% 30%, #f8fcff 0%, #b0c4e0 100%);
      border-radius: 35% 35% 50% 50%; margin: -8px auto 0;
      box-shadow: 0 12px 20px rgba(0,0,0,0.35);
      position: relative; transform: perspective(200px) rotateX(5deg);
    }

    .ground-shadow {
      width: 180px; height: 30px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.8) 0%, transparent 100%);
      border-radius: 50%; filter: blur(18px); margin-top: 35px; transition: opacity 0.5s ease;
    }

    .tech-particles { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    .particle {
      position: absolute; width: 2px; height: 2px; background: #0cf; border-radius: 50%; opacity: 0;
      animation: particleFloat 4s infinite; box-shadow: 0 0 8px #0cf;
    }
    @keyframes particleFloat { 0% { opacity: 0; transform: translateY(0) scale(0); } 20% { opacity: 0.9; } 100% { opacity: 0; transform: translateY(-80px) scale(1.5); } }
    @keyframes floatAfter { 0%, 100% { transform: translate(-50%, -50%) scale(0.65) translateY(0px); } 50% { transform: translate(-50%, -50%) scale(0.65) translateY(-20px); } }
    .robot-container.float-active { animation: floatAfter 3s ease-in-out infinite; }

    /* ===== HOLOGRAM SCREEN ===== */
    .hologram-screen {
      position: absolute; top: 16%; left: 50%;
      transform: translateX(-50%) scale(0);
      width: 380px; min-height: 220px;
      background: rgba(0,242,255,0.04); backdrop-filter: blur(12px);
      border-radius: 30px; border: 1.5px solid rgba(0,242,255,0.5);
      box-shadow: 0 0 60px rgba(0,242,255,0.3), inset 0 0 40px rgba(0,242,255,0.08);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 200; opacity: 0;
      transition: transform 1s cubic-bezier(0.34,1.2,0.64,1), opacity 0.6s ease, width 1s ease, height 1s ease, border-radius 1s ease, top 1s ease;
      pointer-events: none; padding: 24px 20px;
    }
    .hologram-screen.show { transform: translateX(-50%) scale(1); opacity: 1; pointer-events: auto; }
    .hologram-screen.fullscreen {
      width: 94vw; height: 85vh; top: 50%;
      transform: translateX(-50%) translateY(-50%) scale(1); border-radius: 28px;
    }
    .hologram-screen.compact {
      width: 300px; height: auto; top: 7%;
      transform: translateX(-50%) scale(1); border-radius: 20px; padding: 0;
    }
    .hologram-screen::before {
      content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(135deg, #0cf, #5a9eff, #aaffff, #0cf);
      border-radius: 32px; opacity: 0.2; z-index: -1; filter: blur(10px);
    }
    .holo-content { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; position: relative; z-index: 2; }
    .holo-message { font-size: 48px; font-weight: 900; color: #fff; text-shadow: 0 0 30px #0cf, 0 0 60px #0cf; letter-spacing: 5px; background: linear-gradient(135deg, #fff, #d4f4ff, #aaffff); -webkit-background-clip: text; background-clip: text; color: transparent; animation: glowText 3s infinite alternate; margin: 0; text-align: center; }
    .holo-sub-message { font-size: 24px; font-weight: 700; color: rgba(170,255,255,0.95); text-shadow: 0 0 20px #0cf; text-align: center; }
    .holo-goodbye { font-size: 36px; font-weight: 900; color: #fff; text-shadow: 0 0 30px #0cf; letter-spacing: 3px; }
    @keyframes glowText { 0% { text-shadow: 0 0 30px #0cf; } 100% { text-shadow: 0 0 50px #5a9eff, 0 0 90px #aaffff; } }
    .typing-indicator { display: flex; gap: 10px; padding: 15px 0; }
    .typing-dot { width: 14px; height: 14px; background: #0cf; border-radius: 50%; box-shadow: 0 0 20px #0cf; animation: typingBounce 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(1) { animation-delay: 0s; } .typing-dot:nth-child(2) { animation-delay: 0.2s; } .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-15px); opacity: 1; } }
    .holo-button {
      background: rgba(0,242,255,0.12); border: 1.5px solid rgba(0,242,255,0.7);
      border-radius: 40px; padding: 12px 36px; color: #fff; font-size: 20px; font-weight: 700; letter-spacing: 3px;
      cursor: pointer; backdrop-filter: blur(8px); box-shadow: 0 0 30px rgba(0,242,255,0.3);
      transition: all 0.3s ease; margin-top: 10px; text-shadow: 0 0 12px #0cf; font-family: 'Cairo', sans-serif;
    }
    .holo-button:hover { background: rgba(0,242,255,0.25); box-shadow: 0 0 50px #0cf; transform: scale(1.05); }
    .key-input-container { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; max-width: 340px; padding: 10px; }
    .key-input-container label { color: rgba(170,255,255,0.9); font-size: 18px; font-weight: 700; text-shadow: 0 0 12px rgba(0,204,255,0.5); }
    .key-input-field {
      width: 100%; padding: 14px 20px; background: rgba(0,242,255,0.06);
      border: 1.5px solid rgba(0,242,255,0.5); border-radius: 16px; color: #fff; font-size: 18px;
      font-family: 'Cairo', monospace; letter-spacing: 4px; text-align: center; outline: none;
      backdrop-filter: blur(6px); transition: all 0.3s ease; direction: ltr;
    }
    .key-input-field::placeholder { color: rgba(0,242,255,0.3); font-size: 14px; }
    .key-input-field:focus { border-color: #0cf; box-shadow: 0 0 30px rgba(0,242,255,0.3); }
    .key-error { color: #ff6b6b; font-size: 14px; min-height: 20px; opacity: 0; transition: opacity 0.3s ease; }
    .key-error.show { opacity: 1; }

    /* ===== PROFESSIONAL SIGNAL CARD - FULLSCREEN ===== */
    .sig-card-fs {
      width: 100%; max-width: 480px;
      background: linear-gradient(170deg, rgba(6,18,35,0.97) 0%, rgba(2,8,20,0.99) 100%);
      border: 1px solid rgba(0,242,255,0.3);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      opacity: 0; transform: scale(0.85) translateY(30px);
      transition: all 1s cubic-bezier(0.34,1.2,0.64,1);
    }
    .sig-card-fs.show { opacity: 1; transform: scale(1) translateY(0); }

    .sig-card-fs::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #0cf 20%, #5a9eff 50%, #0cf 80%, transparent);
      animation: shimmerBar 3s linear infinite;
    }
    @keyframes shimmerBar { 0% { background-position: -300px 0; } 100% { background-position: 300px 0; } }

    .sig-card-fs::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,242,255,0.015) 3px, rgba(0,242,255,0.015) 4px);
      pointer-events: none; border-radius: 24px;
    }

    .sc-fs-header {
      text-align: center; padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(0,242,255,0.12);
      position: relative;
    }
    .sc-fs-header::after {
      content: ''; position: absolute; bottom: -1px; left: 15%; right: 15%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,242,255,0.5), transparent);
    }
    .sc-fs-brand {
      font-family: 'Orbitron', sans-serif;
      font-size: 40px; font-weight: 900;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #ffffff 0%, #0cf 40%, #5a9eff 60%, #0cf 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(0,204,255,0.3));
      display: flex; align-items: center; justify-content: center; gap: 14px;
      line-height: 1.2;
    }
    .sc-fs-brand .diamond-icon { width: 34px; height: 34px; filter: drop-shadow(0 0 12px #0cf); }

    .sc-fs-edition {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px; font-weight: 600; letter-spacing: 6px;
      color: #ffd700; margin-top: 8px;
      text-shadow: 0 0 15px rgba(255,215,0,0.4);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .sc-fs-edition .trophy-icon { width: 18px; height: 18px; filter: drop-shadow(0 0 6px rgba(255,215,0,0.6)); }

    .sc-fs-body { padding: 24px 30px; }

    .sc-fs-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; margin-bottom: 8px;
      background: rgba(0,242,255,0.03);
      border: 1px solid rgba(0,242,255,0.08);
      border-radius: 14px;
      transition: all 0.3s ease;
    }
    .sc-fs-row:hover { background: rgba(0,242,255,0.06); border-color: rgba(0,242,255,0.2); }
    .sc-fs-row:last-child { margin-bottom: 0; }

    .sc-fs-row-label {
      display: flex; align-items: center; gap: 10px;
      color: rgba(170,255,255,0.7); font-size: 14px; font-weight: 600; letter-spacing: 1px;
      font-family: 'Inter', sans-serif; text-transform: uppercase;
    }
    .sc-fs-row-label .row-icon { width: 20px; height: 20px; filter: drop-shadow(0 0 6px #0cf); }

    .sc-fs-row-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px; font-weight: 700; letter-spacing: 2px; direction: ltr;
      color: #fff;
    }
    .sc-fs-row-value.buy { color: #00ff88; text-shadow: 0 0 20px rgba(0,255,136,0.5); }
    .sc-fs-row-value.sell { color: #ff4466; text-shadow: 0 0 20px rgba(255,68,102,0.5); }

    .sc-fs-footer {
      text-align: center; padding: 20px 24px 24px;
      border-top: 1px solid rgba(0,242,255,0.12);
      position: relative;
    }
    .sc-fs-footer::before {
      content: ''; position: absolute; top: -1px; left: 15%; right: 15%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,242,255,0.5), transparent);
    }
    .sc-fs-footer-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; font-weight: 500; color: rgba(0,242,255,0.4);
      letter-spacing: 4px;
    }

    /* ===== COMPACT CARD ===== */
    .sig-card-cp {
      width: 100%; max-width: 280px;
      background: linear-gradient(170deg, rgba(6,18,35,0.95) 0%, rgba(2,8,20,0.98) 100%);
      border: 1px solid rgba(0,242,255,0.25);
      border-radius: 18px;
      position: relative; overflow: hidden;
      opacity: 0; transform: scale(0.85);
      transition: all 0.8s cubic-bezier(0.34,1.2,0.64,1);
    }
    .sig-card-cp.show { opacity: 1; transform: scale(1); }
    .sig-card-cp::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #0cf 30%, #5a9eff 50%, #0cf 70%, transparent);
    }

    .sc-cp-close {

    .bottom-nav {

    .page-overlay {

      .sc-fs-row { padding: 10px 14px; }
      .sc-fs-row-label { font-size: 12px; }
      .sc-fs-row-value { font-size: 14px; }

<body>

  <script>
    function createParticles() {
      const c = document.getElementById('particles');
      for (let i = 0; i < 35; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        const s = Math.random() * 3 + 1.5;
        p.style.width = s + 'px'; p.style.height = s + 'px';
        p.style.left = Math.random() * 100 + '%'; p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 5 + 's';
        p.style.animationDuration = Math.random() * 3 + 2 + 's';
        p.style.background = `radial-gradient(circle, #0cf, ${Math.random() > 0.5 ? '#5a9eff' : '#aaffff'})`;
        p.style.boxShadow = `0 0 ${s * 3}px #0cf`;
        c.appendChild(p);
      }
    }
    createParticles();

    const robot = document.getElementById('robot');
    const head = document.getElementById('head');
    const rightArm = document.getElementById('rightArm');
    const leftArm = document.getElementById('leftArm');
    const leftEye = document.getElementById('leftEye');
    const rightEye = document.getElementById('rightEye');
    const sleepZzz = document.getElementById('sleepZzz');
    const reactorCore = document.getElementById('reactorCore');

    const projectorBeam = document.getElementById('projectorBeam');

    const bottomNav = document.getElementById('bottomNav');

    robot.style.left = '50%'; robot.style.top = '50%';
    robot.style.transform = 'translate(-50%, -50%) scale(0.65)';
    head.classList.add('sleeping');
    leftEye.classList.add('closed'); rightEye.classList.add('closed');
    rightArm.classList.add('sleeping'); leftArm.classList.add('sleeping');
    rightArm.style.transform = 'rotate(15deg) translateY(15px)';
    leftArm.style.transform = 'rotate(-20deg) translateY(15px)';
    sleepZzz.classList.add('show');

    function updateBeamPosition() {
      if (!projectorBeam.classList.contains('active')) return;
      const rR = reactorCore.getBoundingClientRect();
      const sR = hologramScreen.getBoundingClientRect();
      const dx = (sR.left + sR.width / 2) - (rR.left + rR.width / 2);
      const dy = (sR.top + sR.height / 2) - (rR.top + rR.height / 2);
      const dist = Math.sqrt(dx * dx + dy * dy);
      const ang = Math.atan2(dy, dx) * 180 / Math.PI;
      projectorBeam.style.width = dist + 'px';
      projectorBeam.style.height = '10px';
      projectorBeam.style.left = (rR.left + rR.width / 2) + 'px';
      projectorBeam.style.top = (rR.top + rR.height / 2 - 5) + 'px';
      projectorBeam.style.transform = `rotate(${ang}deg)`;
      projectorBeam.style.transformOrigin = '0 50%';
    }
    let beamInterval;
    function startBeamUpdate() { if (beamInterval) clearInterval(beamInterval); beamInterval = setInterval(updateBeamPosition, 50); }

      </div>`);
      const inp = document.getElementById('keyInputField');
      const btn = document.getElementById('enterKeyBtn');
      const err = document.getElementById('keyError');
      inp.focus();
      function tryEnter() {
        if (inp.value.trim().length > 0) { activateFullscreenCard(); }
        else { err.classList.add('show'); inp.style.borderColor = '#ff4466'; setTimeout(() => { err.classList.remove('show'); inp.style.borderColor = 'rgba(0,242,255,0.5)'; }, 2000); }
      }
      btn.addEventListener('click', tryEnter);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryEnter(); });
    }

    function getEntryTime() { const n = new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }

      hologramScreen.classList.add('fullscreen');
      bottomNav.classList.add('show');

                <div class="sc-fs-row-label">
                  <svg class="row-icon" viewBox="0 0 24 24" fill="none" stroke="#0cf" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

        setTimeout(() => { const c = document.getElementById('sigCardMain'); if (c) c.classList.add('show'); }, 300);
      } else {
        setHolo(`

                <div class="sc-cp-row-value buy">BUY</div>
              </div>
            </div>

                <svg class="trophy-icon" viewBox="0 0 24 24" fill="none" stroke="#ffd700" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                ROYAL GOLD
                <svg class="trophy-icon" viewBox="0 0 24 24" fill="none" stroke="#ffd700" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
              </div>
            </div>
          </div>
        `);
        setTimeout(() => {
          const c = document.getElementById('sigCardMain');
          if (c) { c.style.opacity = '1'; c.style.transform = 'scale(1)'; }
          const xBtn = document.getElementById('compactClose');
          if (xBtn) xBtn.addEventListener('click', startGoodbyeSequence);
        }, 300);
      }
    }

    function shrinkCard() {
      hologramScreen.classList.remove('fullscreen');
      hologramScreen.classList.add('compact');
      robot.classList.remove('hidden');
      groundShadow.style.opacity = '1';
      robot.classList.add('float-active');
      bottomNav.classList.remove('hidden');
      bottomNav.classList.add('show');
      showSignalCard(false);
    }

    // ===== GOODBYE SEQUENCE =====
    function startGoodbyeSequence() {
      // 1. Hide hologram screen first so waving is visible
      hologramScreen.classList.remove('compact', 'fullscreen', 'show');
      bottomNav.classList.remove('show');
      bottomNav.classList.add('hidden');

      setTimeout(() => {
        // 2. Start waving and move robot back to center simultaneously
        let waveCt = 0;
        const totalWaveDuration = 3000;
        const waveSpeed = 250;
        const waveCount = Math.floor(totalWaveDuration / waveSpeed);

        const wv = setInterval(() => {
          if (waveCt < waveCount) {
            rightArm.style.transform = waveCt % 2 === 0 ? 'rotate(110deg)' : 'rotate(15deg)';
            waveCt++;
          } else {
            clearInterval(wv);
            rightArm.style.transform = 'rotate(15deg)';
          }
        }, waveSpeed);

        // Head tilts down, eyes close
        head.classList.remove('looking-up');
        head.classList.add('sleeping');
        leftEye.classList.remove('looking-up');
        rightEye.classList.remove('looking-up');
        leftEye.classList.add('closed');
        rightEye.classList.add('closed');

        // Robot returns to center
        robot.style.left = '50%';
        robot.style.top = '50%';
        robot.style.transform = 'translate(-50%, -50%) scale(0.65)';
        groundShadow.style.opacity = '1';
        robot.classList.remove('float-active');

        // After movement completes, stop waving and show Zzz
        setTimeout(() => {
          clearInterval(wv);
          rightArm.style.transform = 'rotate(15deg)';
          leftArm.style.transform = 'rotate(-20deg)';
          rightArm.classList.add('sleeping');
          leftArm.classList.add('sleeping');
          rightArm.style.transform = 'rotate(15deg) translateY(15px)';
          leftArm.style.transform = 'rotate(-20deg) translateY(15px)';

          projectorBeam.classList.remove('active');
          reactorCore.classList.remove('projecting');

          // Show Zzz after waving stops
          sleepZzz.classList.add('show');
        }, totalWaveDuration + 800);

      }, 300);
    }

    function openResultsPage() {
      const page = document.getElementById('resultsPage');
      const content = document.getElementById('resultsContent');
      content.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card">
            <svg viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            <div class="stat-value green">87%</div>
            <div class="stat-label">Win Rate</div>
          </div>
          <div class="stat-card">
            <svg viewBox="0 0 24 24" fill="none" stroke="#0cf" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
            <div class="stat-value cyan">24</div>
            <div class="stat-label">Total Trades</div>
          </div>
          <div class="stat-card">
            <svg viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>
            <div class="stat-value green">21</div>
            <div class="stat-label">Wins</div>
          </div>
          <div class="stat-card">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ff4466" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
            <div class="stat-value red">3</div>
            <div class="stat-label">Losses</div>
          </div>
        </div>
        <div style="text-align:center;margin-top:8px;margin-bottom:4px;"><span style="color:rgba(170,255,255,0.7);font-size:14px;font-weight:700;">Trade History</span></div>
        <div class="results-list" id="resultsList"></div>
      `;
      page.classList.add('show');
      const rd = [
        { pair: 'USDTRY-OTC', dir: 'buy', time: '14:35', result: 'win', profit: '+$45' },
        { pair: 'EURUSD-OTC', dir: 'sell', time: '14:20', result: 'win', profit: '+$38' },
        { pair: 'GBPUSD-OTC', dir: 'buy', time: '14:05', result: 'win', profit: '+$52' },
        { pair: 'USDJPY-OTC', dir: 'sell', time: '13:50', result: 'loss', profit: '-$20' },
        { pair: 'AUDUSD-OTC', dir: 'buy', time: '13:35', result: 'win', profit: '+$41' },
        { pair: 'NZDUSD-OTC', dir: 'sell', time: '13:20', result: 'win', profit: '+$35' },
        { pair: 'USDCAD-OTC', dir: 'buy', time: '13:05', result: 'loss', profit: '-$18' },
        { pair: 'EURGBP-OTC', dir: 'sell', time: '12:50', result: 'win', profit: '+$47' },
      ];
      const list = document.getElementById('resultsList');
      let rhtml = '';
      rd.forEach((r, i) => {
        const dL = r.dir === 'buy' ? 'BUY' : 'SELL';
        const rL = r.result === 'win' ? 'WIN' : 'LOSS';
        rhtml += `<div class="signal-item" data-index="${i}">
          <div class="signal-item-header"><span class="signal-item-pair">${r.pair}</span><span class="signal-item-direction ${r.dir}">${dL}</span></div>
          <div class="signal-item-details">
            <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0cf" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${r.time}</span>
            <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0cf" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>1 MIN</span>
          </div>
          <div class="signal-item-result ${r.result}">${rL} <span style="font-weight:900;font-size:16px;">${r.profit}</span></div>
        </div>`;
      });
      list.innerHTML = rhtml;
      setTimeout(() => { list.querySelectorAll('.signal-item').forEach((item, i) => { setTimeout(() => item.classList.add('show'), i * 100); }); }, 400);
    }

    function closeResultsPage() { document.getElementById('resultsPage').classList.remove('show'); }
    document.getElementById('navResults').addEventListener('click', () => { openResultsPage(); });

    // ===== BOOT SEQUENCE =====
    setTimeout(() => {
      head.classList.remove('sleeping');
      leftEye.classList.remove('closed'); rightEye.classList.remove('closed');
      rightArm.classList.remove('sleeping'); leftArm.classList.remove('sleeping');
      rightArm.style.transform = 'rotate(15deg)'; leftArm.style.transform = 'rotate(-20deg)';
      sleepZzz.classList.remove('show');

      setTimeout(() => {
        let wc = 0;
        const wi = setInterval(() => {
          if (wc < 6) {
            rightArm.style.transform = wc % 2 === 0 ? 'rotate(110deg)' : 'rotate(15deg)';
            leftArm.style.transform = wc % 2 === 0 ? 'rotate(-100deg)' : 'rotate(-20deg)';
            wc++;
          } else {
            clearInterval(wi);
            rightArm.style.transform = 'rotate(15deg)';
            leftArm.style.transform = 'rotate(-20deg)';
            setTimeout(() => {
              robot.style.left = '42%'; robot.style.top = '78%';
              robot.style.transform = 'translate(-50%, -50%) scale(0.6)';
              groundShadow.style.opacity = '0.3';
              setTimeout(() => {
                reactorCore.classList.add('projecting');
                projectorBeam.classList.add('active');
                updateBeamPosition();
                head.classList.add('looking-up');
                leftEye.classList.add('looking-up'); rightEye.classList.add('looking-up');
                hologramScreen.classList.add('show');
                showTyping();
                setTimeout(() => {
                  showWelcome();
                  setTimeout(() => {
                    showTyping();
                    setTimeout(() => { showReadyPrompt(); }, 1000);
                  }, 2500);
                }, 1500);
              }, 800);
            }, 500);
          }
        }, 170);
      }, 600);
    }, 4000);

    document.querySelectorAll('.eye').forEach(eye => {
      eye.addEventListener('click', function() {
        if (!this.classList.contains('closed')) {
          const by = this.classList.contains('looking-up') ? 6 : 10;
          this.style.transform = `translateY(${by}px) scale(1.05)`;
          setTimeout(() => this.style.transform = `translateY(${by}px) scale(1)`, 200);
        }
      });
    });
  </script>
</body>
</html>
